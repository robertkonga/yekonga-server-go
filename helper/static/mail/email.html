<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ appName }}</title>
</head>

<body>
    <table align="center" bgcolor="{{ darkBackgroundColor }}" border="0" cellpadding="0" cellspacing="0" width="682">
        <tbody>
            <tr>
                <td colspan="3" style="line-height:1px;font-size:0px" bgcolor="#b2b2b2">
                    <div style="width:1px;height:1px;"></div>
                </td>
            </tr>
            <tr>
                <td bgcolor="#b2b2b2">
                    <div style="width:1px;"></div>
                </td>
                <td align="center">
                    <table bgcolor="#FFFFFF" border="0" cellpadding="0" cellspacing="0" width="680">
                        <tbody>
                            <tr>
                                <td>
                                    <div style="width:45px"></div>
                                </td>
                                <td>
                                    <table border="0" cellpadding="0" cellspacing="0">
                                        <tbody>
                                            <tr>
                                                <td style="text-align:center;" align="center">
                                                    <div style="height:45px"></div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td style="text-align:center;" align="center">
                                                    <a href="{{ website }}" target="_blank" style="display: block;text-align: center;">
                                                        <img src="{{ logoUrl }}" border="0" height="100">
                                                    </a>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <div style="height:30px"></div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td align="left" valign="top">
                                                    <div style="min-height:260px;">
                                                        <font style="font-size:22px;line-height:21px;color:{{ primaryColor }}" face="Arial, Helvetica, Verdana">Hello! {{ name }},<br><br></font>
                                                        <font style="font-size:14px;line-height:20px" face="Verdana, Arial, Helvetica">
                                                            {{ content }}
                                                            <br>
                                                        </font>
                                                    </div>
                                                </td>
                                            </tr>

                                            <tr>
                                                <td>
                                                    <div style="height:30px"></div>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td align="left" valign="top">
                                                    <font style="font-size:14px;line-height:20px" face="Verdana, Arial, Helvetica">Cheers,<br></font>
                                                    <font style="font-size:18px;line-height:21px;color:{{ primaryColor }}" face="Arial, Helvetica, Verdana">{{ appName }} Team<br></font>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <div style="height:30px"></div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </td>
                                <td>
                                    <div style="width:45px;"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <table border="0" cellpadding="0" cellspacing="0" width="590">
                        <tbody>
                            <tr>
                                <td height="25"><br></td>
                            </tr>
                            <tr>
                                <td align="left" valign="top">
                                    <font style="font-family:Arial,Verdana,Helvetica,sans-serif;font-size:16px;line-height:25px" color="#9A9A9A" face="Verdana, Arial, Helvetica, sans-serif">
                                        Please do not reply to this email<br>
                                    </font>
                                </td>

                            </tr>
                            <tr>
                                <td height="32"><br></td>
                            </tr>
                            <tr>
                                <td align="left" valign="top">
                                    <font style="font-size:11px;line-height:14px" color="#9A9A9A" face="Verdana, Arial, Helvetica" size="1"><a href="{{ website }}" style="text-decoration:none;color:{{ secondaryColor }};" target="_blank">© {{ appName }} {{ year }}</a></font>
                                </td>
                                <td align="right" valign="top">
                                    <font style="font-size:11px;line-height:14px" color="#9A9A9A" face="Verdana, Arial, Helvetica" size="1">designed by <a href="{{ website }}" style="color:{{ secondaryColor }};text-decoration:none" target="_blank">{{ appName }}</a></font>
                                </td>
                            </tr>
                            <tr>
                                <td height="65">
                                    <div style="height:1px;width:1px;"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                </td>
                <td bgcolor="#c0c9ce">
                    <div style="width:1px;"></div>
                </td>
            </tr>
            <tr>
                <td colspan="3" style="line-height:1px;font-size:0px" bgcolor="#c0c9ce">
                    <div style="width:1px;height:1px;"></div>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
